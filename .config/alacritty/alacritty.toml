[general]
import = ["~/.config/alacritty/alacritty-local.toml"]

[font]
size = 11

[font.normal]
family = "Iosevka"

[colors.primary]
background = "#1a1c1e"
foreground = "#d4d4d4"

[colors.normal]
black   = "#1a1c1e"
red     = "#e06060"
green   = "#5b9a6a"
yellow  = "#c4b060"
blue    = "#6090c0"
magenta = "#a070b0"
cyan    = "#6a9e8e"
white   = "#d4d4d4"

[colors.bright]
black   = "#8a8070"
red     = "#f0b5b5"
green   = "#98c2a2"
yellow  = "#dfd4aa"
blue    = "#a9c2dc"
magenta = "#cbb1d4"
cyan    = "#a7c6bc"
white   = "#ffffff"

# Some default env vars.
env = XCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = YDOTOOL_SOCKET,/run/user/1001/.ydotool_socket

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=DP-1,2560x1440,0x0,auto
monitor=DP-3,3440x1440,0x0,1.6
#monitor=DP-6,3440x1440@59.97300,0x0,auto
#monitor=DP-3,highrr,0x0,auto
monitor=eDP-1,highrr,2200x300,auto
#monitor=eDP-1,highrr,0x0,auto
# offices
#monitor=eDP-1,highrr,1600x1440,auto

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = hyprpaper & waybar
exec-once = hypridle
exec-once = swaync

# exec-once = lockscreen # i swear swaylock is bugged-- does not accept my password
exec-once = kwalletd5
exec-once = printenv -0 > /tmp/env.txt
exec-once = wl-paste --watch cliphist store
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = udiskie

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =

    kb_rules =

    kb_options=ctrl:nocaps
    repeat_rate =   25
    repeat_delay = 200

    follow_mouse = 1
    mouse_refocus = false

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

source = ~/.config/hypr/hyprland-colors.conf

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 3
    border_size = 2
    col.active_border = rgba($active_border_1) rgba($active_border_2) 45deg
    col.inactive_border = rgba($inactive_border_1) rgba($inactive_border_2) 45deg
    layout = dwindle

}

binds {
    allow_workspace_cycles = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 7
    shadow {
       range = 8
       render_power = 3
       color = rgba($shadow_color)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
        ignore_opacity = false
    }
}

# SwayNC blur (0.53+ syntax)
layerrule = match:namespace = swaync-control-center, blur 1
layerrule = match:namespace = swaync-notification-window, blur 1


animations {
    enabled = 1

    # Curves
    bezier = snappy, 0.2, 1.0, 0.3, 1.0
    bezier = bounce, 0.18, 1.2, 0.3, 1.0
    bezier = smooth, 0.4, 0.0, 0.2, 1.0
    bezier = liner, 1, 1, 1, 1

    # Windows
    animation = windowsIn, 1, 4, bounce, popin 70%
    animation = windowsOut, 1, 3, snappy, popin 70%
    animation = windowsMove, 1, 3, snappy, slide

    # Layers (swaync, waybar, etc)
    animation = layersIn, 1, 3, bounce, slide top
    animation = layersOut, 1, 2, snappy, slide top

    # Fades
    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 4, smooth
    animation = fadeSwitch, 1, 3, smooth
    animation = fadeShadow, 1, 4, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeLayers, 1, 3, smooth

    # Workspaces
    animation = workspaces, 1, 4, snappy, slidefade 30%
    animation = specialWorkspace, 1, 4, bounce, slidefadevert 40%

    # Border
    animation = border, 1, 1, liner
    animation = borderangle, 1, 20, liner, loop
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    new_status = slave
}


windowrule = match:float yes, opacity 0.9 0.9
windowrule = match:class ^(emacs)$, opacity 0.92 0.85

# window specific
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(mpv)$, center on
windowrule = match:class ^(mpv)$, size 900 500

# windowrule = match:title ^(.*gptel.*)$, float on
# windowrule = match:title ^(.*gptel.*)$, size 480 644
# windowrule = match:title ^(.*gptel.*)$, move (monitor_w*0.5) (monitor_h*0.1)
# windowrule = match:title ^(.*gptel.*)$, match:float yes, opacity 0.9 0.01

windowrule = match:title ^(Picture-in-Picture|Picture in picture)$, size (monitor_w*0.19) (monitor_h*0.25)
windowrule = match:title ^(Picture-in-Picture|Picture in picture)$, move (monitor_w*0.79) (monitor_h*0.057)
windowrule = match:title ^(Picture-in-Picture|Picture in picture)$, float on
windowrule = match:title ^(Picture-in-Picture|Picture in picture)$, pin on

# Chrome DevTools (floating, pinned, top-right like PiP)
windowrule = match:title ^DevTools, match:class ^(google-chrome)$, float on
windowrule = match:title ^DevTools, match:class ^(google-chrome)$, pin on
windowrule = match:title ^DevTools, match:class ^(google-chrome)$, size (monitor_w*0.28) (monitor_h*0.22)
windowrule = match:title ^DevTools, match:class ^(google-chrome)$, move (monitor_w*0.6) (monitor_h*0.09)

# System update terminal (PiP-style, top right)
windowrule = match:class ^(system-update)$, float on
windowrule = match:class ^(system-update)$, size (monitor_w*0.2) (monitor_h*0.2)
windowrule = match:class ^(system-update)$, move (monitor_w*0.75) (monitor_h*0.1)

# Startup health fix terminal (PiP-style, top right)
windowrule = match:class ^(startup-fix)$, float on
windowrule = match:class ^(startup-fix)$, size (monitor_w*0.2) (monitor_h*0.2)
windowrule = match:class ^(startup-fix)$, move (monitor_w*0.75) (monitor_h*0.1)


# Zoom windows
windowrule = match:class ^(Zoom).*, float on
windowrule = match:class ^(Zoom).*, match:title ^(zoom)$, size (monitor_w*0.7) (monitor_h*0.7)
windowrule = match:class ^(Zoom).*, match:title ^(zoom)$, center on
# Zoom dropdown menus - stay focused so they don't vanish
windowrule = match:class ^(zoom)$, match:title ^(menu window)$, stay_focused on
windowrule = match:class ^(zoom)$, match:title ^(confirm window)$, stay_focused on
windowrule = match:class ^(zoom)$, match:title ^(menu window)$, move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5))
# Zoom sharing toolbar
windowrule = match:class ^(Zoom).*, match:title ^(as_toolbar)$, suppress_event activate activatefocus
windowrule = match:class ^(Zoom).*, match:title ^(as_toolbar)$, pin on

# Async shell command output (floating, small)
windowrule = match:initial_title ^(async-shell-popup)$, float on
windowrule = match:initial_title ^(async-shell-popup)$, size (monitor_w*0.46) (monitor_h*0.54)
windowrule = match:initial_title ^(async-shell-popup)$, move (monitor_w*0.52) (monitor_h*0.21)

# gptel-agent prompt popup (minimal, centered)
windowrule = match:initial_title ^(gptel-agent-prompt)$, float on
windowrule = match:initial_title ^(gptel-agent-prompt)$, center on
windowrule = match:initial_title ^(gptel-agent-prompt)$, size (monitor_w*0.46) (monitor_h*0.54)
windowrule = match:initial_title ^(gptel-agent-prompt)$, move (monitor_w*0.52) (monitor_h*0.21)

# Google Calendar popup
windowrule = match:class ^(com\.gcal\.popup)$, float on
windowrule = match:class ^(com\.gcal\.popup)$, pin on

# fzf-picker floating window (clipboard, etc)
windowrule = match:initial_class ^(fzf-picker)$, float on
windowrule = match:initial_class ^(fzf-picker)$, size 621 359
windowrule = match:initial_class ^(fzf-picker)$, center on
windowrule = match:initial_class ^(fzf-picker)$, opacity 0.92 0.85

# Claude Ask floating input
windowrule = match:initial_class ^(claude-ask)$, float on
windowrule = match:initial_class ^(claude-ask)$, size (monitor_w*0.4) (monitor_h*0.5)
windowrule = match:initial_class ^(claude-ask)$, center on

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# groups?
# Create a group from the active window
bind = SUPER, G, togglegroup

# Move a window into an adjacent group
bind = SUPER SHIFT, G, moveintogroup, r

# Toggle between grouped windows with SUPER+A
bind = SUPER, A, changegroupactive, f

# Or go backwards
bind = SUPER SHIFT, A, changegroupactive, b

group {
    groupbar {
        enabled = true
        font_size = 10
        height = 14
        col.active = rgb($groupbar_active)
        col.inactive = rgb($groupbar_inactive)
    }
}

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, M, exit

binde=, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +1000
binde=, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -1000
binde=, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

binde=, XF86AudioPlay, exec, playerctl play-pause
binde=, XF86AudioNext, exec, playerctl next
binde=, XF86AudioPrev, exec, playerctl previous

# Tool layer hax
binde=, XF86VoiceCommand, exec, voice-typing
binde=, XF86LaunchA, exec, launch-control-center toggle

binde=, XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde=, XF86MonBrightnessDown, exec, brightnessctl set 5%-

# mod + shift + key is for doing non-hyprland things
bind = $mainMod SHIFT, RETURN, exec, vterm
bind = $mainMod SHIFT, P, exec, projectile
bind = $mainMod SHIFT, S, exec, grimslurp
bind = $mainMod SHIFT, O, exec, grimslurp-ocr
bind = $mainMod SHIFT, B, exec, google-chrome-stable --new-window
bind = $mainMod SHIFT, F, exec, find-file
bind = $mainMod SHIFT, D, exec, org-roam-daily
bind = $mainMod SHIFT, T, exec, voice-typing
bind = $mainMod SHIFT, V, exec, gptel
bind = $mainMod SHIFT, G, exec, claude-ask
bind = , mouse:275, exec, echo '{"action":"listen"}' | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/claude-voice.sock
bind = $mainMod SHIFT, E, exec, notmuch-open
bind = $mainMod SHIFT, space, exec, foot --app-id=fzf-picker -e emoji-picker && sleep 0.1 && wtype -M ctrl v -m ctrl
bind = $mainMod SHIFT, C, exec, foot --app-id=fzf-picker -e clip-picker
bind = $mainMod SHIFT, X, exec, foot --app-id=fzf-picker -e run-command
bind = $mainMod SHIFT, R, exec, foot --app-id=fzf-picker -e record
bind = $mainMod SHIFT, W, exec, foot --app-id=fzf-picker -e theme-picker

# mod + key is for doing hyprland window stuff
bind = $mainMod, slash, exec, foot --app-id=fzf-picker -e app-launcher
bind = $mainMod, Q, killactive
bind = $mainMod, S, exec, hyprctl --batch "dispatch togglefloating active; dispatch resizeactive exact 60% 60%; dispatch centerwindow active"
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pin


# Move focus with mainMod + arrow keys
bind = $mainMod, J, cyclenext
bind = $mainMod, J, bringactivetotop

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, TAB, workspace, previous


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow



# Turn monitors off if locked (swaylock running) and idle for 10 seconds
# exec-once = swayidle -w timeout 10 'if pgrep -x swaylock; then hyprctl dispatch dpms off; fi' resume 'hyprctl dispatch dpms on'

# Lock screen after idle for 300s and turn monitors off after 330
# exec-once = swayidle -w timeout 300 'swaylock' timeout 330 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'\

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = kdeconnectd
exec-once = sleep 3 && rquickshare
exec-once = kdeconnect-indicator
exec-once = sleep 3 && random-wallpaper
exec-once = emacs --daemon
exec-once = ssh-add ~/.ssh/id_ed25519
exec-once = sleep 10 && startup-health
# voice-typing-daemon managed by systemd: systemctl --user enable voice-typing

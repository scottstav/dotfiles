[meta]
name = "Abyss"
style = "dark"
font = "Iosevka 12"
wallpaper = "~/Dropbox/Images/wallpapers/hubble-ultra-deep-field.jpg"

[palette]
background    = "#080810"
surface       = "#121220"
foreground    = "#d0d0e0"
dim           = "#505068"
border        = "#282840"

[hues]
red           = "#d04848"
orange        = "#d09040"
yellow        = "#d0b850"
green         = "#50a060"
cyan          = "#50a0c0"
blue          = "#4070c0"
magenta       = "#b050a0"

[roles]
accent        = "orange"
accent_bright = "yellow"
secondary     = "#3a3a58"
error         = "red"
warning       = "orange"
success       = "green"

[overlay]
position = "top-right"
width = 500
max_lines = 4
margin_top = 10
margin_right = 10
margin_bottom = 0
margin_left = 0
padding_top = 18
padding_right = 24
padding_bottom = 18
padding_left = 24
corner_radius = 6
border_width = 1
accent_height = 3

[emacs]
theme = "tango-dark"

[meta]
name = "Forest"
style = "dark"
font = "Iosevka 12"
wallpaper = "~/Dropbox/Images/wallpapers/pixel-balcony.png"

[palette]
background    = "#1a1c1e"
surface       = "#252a24"
foreground    = "#d4d4d4"
dim           = "#8a8070"
border        = "#5a4a3a"

[hues]
red           = "#e06060"
orange        = "#d4944a"
yellow        = "#c4b060"
green         = "#5b9a6a"
cyan          = "#6a9e8e"
blue          = "#6090c0"
magenta       = "#a070b0"

[roles]
accent        = "green"
accent_bright = "cyan"
secondary     = "#8b7355"
error         = "red"
warning       = "orange"
success       = "green"

[emacs]
theme = "wheatgrass"

[emacs.faces]
mode-line-active-bg   = "#2a3a2a"
mode-line-active-fg   = "#b0c0b0"
mode-line-inactive-bg = "#2a2520"
mode-line-inactive-fg = "#7a7060"

[meta]
name = "Forest"
style = "dark"
font = "Iosevka 12"
wallpaper = "~/Dropbox/Images/wallpapers/pixel-balcony.png"

[palette]
background    = "#1a1c1e"
surface       = "#252a24"
foreground    = "#d4d4d4"
dim           = "#8a8070"
border        = "#5a4a3a"

[hues]
red           = "#e06060"
orange        = "#d4944a"
yellow        = "#c4b060"
green         = "#5b9a6a"
cyan          = "#6a9e8e"
blue          = "#6090c0"
magenta       = "#a070b0"

[roles]
accent        = "green"
accent_bright = "cyan"
secondary     = "#a07048"
error         = "red"
warning       = "orange"
success       = "green"

[overlay]
position = "top-center"
width = 550
max_lines = 6
margin_top = 8
margin_right = 0
margin_bottom = 0
margin_left = 0
padding_top = 12
padding_right = 16
padding_bottom = 12
padding_left = 16
corner_radius = 12
border_width = 2
accent_height = 4

[emacs]
theme = "modus-vivendi"

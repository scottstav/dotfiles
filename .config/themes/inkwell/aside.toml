[model]
name = "anthropic/claude-haiku-4-5"
system_prompt = "Be concise. Short, direct answers. Skip filler and preamble."

[voice]
enabled = false
stt_model = "base"
stt_device = "cpu"
smart_silence = true
silence_timeout = 2.5
no_speech_timeout = 3.0

[tts]
enabled = false
speed = 1.0

[storage]
archive_dir = "~/Dropbox/LLM/Chats"

[tools]
dirs = ["~/.config/aside/tools"]

[status]
signal = 12

[input]
font = "Iosevka 12"

[overlay]
font = "Iosevka 12"
position = "top-center"

[overlay.colors]
background = "#12101ae6"
foreground = "#d0ccd5ff"
border = "#383344ff"
accent = "#9a7098"
user_accent = "#4a4555"

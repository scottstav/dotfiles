[meta]
name = "Ocean"
style = "dark"
font = "Iosevka 12"
wallpaper = "~/Dropbox/Images/wallpapers/spirited-away-ocean-dark.jpg"

[palette]
background    = "#0a0e14"
surface       = "#1a1e24"
foreground    = "#e0e0e0"
dim           = "#6e7681"
border        = "#3a3a4a"

[hues]
